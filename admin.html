<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Studio Skyline</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-card {
      border-radius: 16px; border: 1px solid rgba(228,228,231,0.6);
      background: rgba(255,255,255,0.7); backdrop-filter: blur(12px);
      padding: 24px; transition: border-color 0.2s;
    }
    .admin-card:hover { border-color: rgba(161,161,170,0.6); }
    .admin-card .title { font-size: 14px; font-weight: 500; }
    .admin-card .desc { margin-top: 4px; font-size: 12px; color: var(--zinc-500); }
    .admin-card a { margin-top: 16px; display: inline-block; font-size: 14px; text-decoration: underline; }
    .admin-grid { margin-top: 24px; display: grid; gap: 16px; }
    .admin-disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="site-main">
    <h1 style="font-size:24px; font-weight:600; letter-spacing:-0.02em">Studio Admin</h1>
    <p style="margin-top:8px; font-size:14px; color:var(--zinc-600)">Manage site content without touching code.</p>

    <div class="admin-grid">
      <div class="admin-card">
        <div class="title">Work</div>
        <div class="desc">Manage work collections and videos (Supabase)</div>
        <a href="admin-work.html">Open editor &rarr;</a>
      </div>

      <div class="admin-card">
        <div class="title">Site Content</div>
        <div class="desc">Edit testimonials, contact info, about section (Supabase)</div>
        <a href="admin-site.html">Open editor &rarr;</a>
      </div>

      <div class="admin-card admin-disabled">
        <div class="title">Production House</div>
        <div class="desc">Edit hero media — coming soon</div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="shared.js"></script>
</body>
</html>
