<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — Studio Skyline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="site-main">
    <div class="section">
      <div class="section-kicker">Archive</div>
      <div class="section-title">Work</div>
      <div class="section-desc">Packaging, print, and production. Click a project to view images.</div>
    </div>

    <div class="work-grid" id="workGrid"></div>
  </div>

  <div id="site-footer"></div>

  <script src="shared.js"></script>
  <script src="data.js"></script>
  <script>
    var grid = document.getElementById("workGrid");
    var html = "";
    WORK_COLLECTIONS.forEach(function(c) {
      html += '<a href="work-detail.html?slug=' + c.slug + '" class="work-card">' +
        '<div class="work-card-inner">' +
          '<div>' +
            (c.index ? '<div class="work-card-idx">' + c.index + '</div>' : '') +
            '<div class="work-card-title">' + c.title + '</div>' +
            (c.subtitle ? '<div class="work-card-sub">' + c.subtitle + '</div>' : '') +
          '</div>' +
          '<div class="work-card-bottom">' +
            '<span>' + c.videos.length + ' video' + (c.videos.length === 1 ? '' : 's') + '</span>' +
            '<span class="work-card-arrow">View &rarr;</span>' +
          '</div>' +
        '</div></a>';
    });
    grid.innerHTML = html;
  </script>
</body>
</html>
