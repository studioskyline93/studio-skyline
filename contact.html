<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Studio Skyline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="site-main">
    <div class="section">
      <div class="section-kicker">Enquiries</div>
      <div class="section-title">Contact</div>
      <div class="section-desc">Tell us what you're making. We'll respond with the right next steps.</div>
    </div>

    <div class="contact-grid">
      <div class="contact-info">
        <div class="kicker">Enquiries</div>
        <h2>Contact</h2>
        <div class="details">
          <div>
            <span class="label-text">Email:</span>
            <a href="mailto:studioskyline93@gmail.com">studioskyline93@gmail.com</a>
          </div>
          <div>
            <span class="label-text">Phone:</span>
            <a href="tel:+919810264240">+91-9810264240</a>
          </div>
          <div>
            <span class="label-text">Address:</span> Okhla Industrial Area, New Delhi
          </div>
        </div>
      </div>

      <div class="contact-form-card">
        <div class="card-title">Quick enquiry form</div>
        <div class="card-note">Fill out the form below and we'll get back to you.</div>
        <form class="contact-form" onsubmit="return false;">
          <input placeholder="Name">
          <input placeholder="Email" type="email">
          <input placeholder="What do you need? (boxes, bags, books...)">
          <textarea placeholder="Details, quantities, timelines, finishes..."></textarea>
          <button type="button" class="btn-primary">Submit</button>
        </form>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="shared.js"></script>
  <script>
    (async function() {
      var site = await loadSiteContent();
      if (!site || !site.contact) return;
      var c = site.contact;
      var el = document.querySelector(".contact-info");
      if (!el) return;

      var html = '<div class="kicker">' + (c.subtitle || "Enquiries") + '</div>';
      html += '<h2>' + (c.title || "Contact") + '</h2>';
      if (c.intro) html += '<p style="margin-top:16px; font-size:14px; line-height:1.6; color:var(--zinc-600)">' + c.intro + '</p>';
      html += '<div class="details">';
      if (c.email) html += '<div><span class="label-text">Email:</span> <a href="mailto:' + c.email + '">' + c.email + '</a></div>';
      if (c.phone) html += '<div><span class="label-text">Phone:</span> <a href="tel:' + c.phone + '">' + c.phone + '</a></div>';
      if (c.whatsapp) html += '<div><span class="label-text">WhatsApp:</span> <a href="https://wa.me/' + c.whatsapp.replace(/\D/g, '') + '">' + c.whatsapp + '</a></div>';
      if (c.address) html += '<div><span class="label-text">Address:</span> ' + c.address + '</div>';
      if (c.mapUrl) html += '<div><a href="' + c.mapUrl + '" target="_blank" rel="noreferrer">Open map</a></div>';
      html += '</div>';
      el.innerHTML = html;
    })();
  </script>
</body>
</html>
